<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Digital Library</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .subject-section { margin-top: 25px; }
        .subject-title { color: #2980b9; font-size: 1.3rem; margin-bottom: 10px; }
        .book-card { display: flex; justify-content: space-between; align-items: center; background: #fafafa; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #3498db; }
        .book-info h3 { margin: 0; font-size: 1.1rem; }
        .btn-link { background: #3498db; color: white; padding: 8px 16px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9rem; }
        .btn-link:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 My Textbook Archive</h1>

    <!-- Subject Section -->
    <div class="subject-section">
        <div class="subject-title">Social Science (SST)</div>
        
        <!-- Book Entry 1 -->
        <div class="book-card">
            <div class="book-info">
                <h3>Gateway to Social Science - Class 9 (Part 1)</h3>
            </div>
            <!-- Replace 'SST PART-1.pdf' with your actual filename if it changes -->
            <a class="btn-link" href="SST PART-1.pdf" target="_blank">Open PDF</a>
        </div>
    </div>

</div>

</body>
</html>
